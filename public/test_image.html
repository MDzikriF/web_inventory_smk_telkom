<!DOCTYPE html>
<html>
<head>
    <title>Image Test</title>
</head>
<body>
    <h1>Image Loading Test</h1>
    
    <h2>External URL Test:</h2>
    <img src="https://images.unsplash.com/photo-1547036967-23d11aacaee0?w=300&h=300&fit=crop" width="100" height="100" style="border: 1px solid red;">
    
    <h2>Local Storage Test:</h2>
    <img src="http://localhost:8000/storage/items/0sPRv00p8gqVtK8R4svdH8Yk6zMzOaRjKZXJYhfJ.jpg" width="100" height="100" style="border: 1px solid blue;">
    
    <h2>Placeholder Test:</h2>
    <img src="https://via.placeholder.com/100x100.png?text=Test" width="100" height="100" style="border: 1px solid green;">
    
    <script>
        // Log image loading events
        document.querySelectorAll('img').forEach((img, index) => {
            img.onload = function() {
                console.log('Image ' + index + ' loaded successfully:', this.src);
            };
            img.onerror = function() {
                console.error('Image ' + index + ' failed to load:', this.src);
            };
        });
    </script>
</body>
</html>
